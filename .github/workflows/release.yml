name: 🚀 Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers only on version tags like v1.0.0

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/StoreIt.Maui/StoreIt.Maui.csproj'

jobs:
  # 📋 Prepare Release Info
  prepare-release:
    name: 📋 Prepare Release Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      display-version: ${{ steps.version.outputs.display-version }}
      build-number: ${{ steps.version.outputs.build-number }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
    - name: 🏷️ Extract Version from Tag
      id: version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        TAG="${GITHUB_REF#refs/tags/}"
        DISPLAY_VERSION=$(echo $VERSION | cut -d'-' -f1)
        BUILD_NUMBER=${{ github.run_number }}
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "display-version=$DISPLAY_VERSION" >> $GITHUB_OUTPUT
        echo "build-number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        
        echo "📋 Version: $VERSION"
        echo "📋 Display: $DISPLAY_VERSION"
        echo "📋 Build: $BUILD_NUMBER"

  # 🤖 Android Build & Deploy
  android-release:
    name: 🤖 Android Release
    runs-on: macos-15
    needs: prepare-release
    
    steps:
    - name: 🍎 Set Xcode version 
      run: sudo xcode-select -s /Applications/Xcode_16.4.app

    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: 📦 Install .NET MAUI Workload
      run: dotnet workload install maui

    - name: 🔍 Restore Dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 🔐 Setup Android Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android-keystore.jks
        echo "ANDROID_KEYSTORE_PATH=$(pwd)/android-keystore.jks" >> $GITHUB_ENV

    - name: 🔨 Build & Sign Android AAB
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -f net9.0-android \
          -c Release \
          /p:ApplicationDisplayVersion="${{ needs.prepare-release.outputs.display-version }}" \
          /p:ApplicationVersion="${{ needs.prepare-release.outputs.build-number }}" \
          /p:AndroidSigningKeyStore=${{ env.ANDROID_KEYSTORE_PATH }} \
          /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
          /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
          /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
          /p:AndroidPackageFormat=aab

    - name: 🍎 Install Fastlane
      run: |
        sudo gem install fastlane

    - name: 🏪 Deploy to Google Play Store
      env:
        GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      run: |
        cd src/StoreIt.Maui
        fastlane supply \
          --aab ../../src/StoreIt.Maui/bin/Release/net9.0-android/publish/*.aab \
          --package_name ${{ secrets.ANDROID_PACKAGE_NAME }} \
          --json_key_data "$GOOGLE_PLAY_JSON_KEY_DATA" \
          --track internal \
          --release_status completed

