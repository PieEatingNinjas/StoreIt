  # 📦 Create GitHub Release
  github-release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, android-release] #, ios-release
    
    steps:
    - name: 🏷️ Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare-release.outputs.tag }}
        name: StoreIt ${{ needs.prepare-release.outputs.version }}
        body: |
          ## StoreIt ${{ needs.prepare-release.outputs.version }}
          
          🚀 New release automatically built and deployed to app stores.
          
          **Version**: ${{ needs.prepare-release.outputs.display-version }}
          **Build**: ${{ needs.prepare-release.outputs.build-number }}
          **Platforms**: Android (Google Play Store) + iOS (App Store)
        draft: false
        prerelease: ${{ contains(needs.prepare-release.outputs.version, 'beta') || contains(needs.prepare-release.outputs.version, 'alpha') || contains(needs.prepare-release.outputs.version, 'rc') }}
        token: ${{ secrets.GITHUB_TOKEN }}