name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/StoreIt.Maui/StoreIt.Maui.csproj'

jobs:
  # # ✅ Build and Test Job
  # build-and-test:
  #   name: 🔨 Build & Test
  #   runs-on: macos-15
    
  #   steps:
  #   - name: 📥 Checkout Code
  #     uses: actions/checkout@v4

  #   - name: 🔧 Setup .NET
  #     uses: actions/setup-dotnet@v4
  #     with:
  #       dotnet-version: ${{ env.DOTNET_VERSION }}

  #   - name: 📦 Install .NET MAUI Workload
  #     run: dotnet workload install maui

  #   - name: 🔍 Restore Dependencies
  #     run: dotnet restore ${{ env.PROJECT_PATH }}

  #   - name: 🔨 Build Project
  #     run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

  # 🤖 Android Build Job
  build-android:
    name: 🤖 Build Android
    runs-on: macos-15
    # needs: build-and-test
    
    steps:

    - name: 🤖 Set Xcode version 
      run: sudo xcode-select -s /Applications/Xcode_16.4.app

    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: 🤖 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 📦 Install .NET MAUI Workload
      run: dotnet workload install maui

    - name: 🔍 Restore Dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 🔨 Build Android APK
      run: dotnet build ${{ env.PROJECT_PATH }} -f net9.0-android -c Release

    # - name: 📦 Publish Android APK
    #   run: dotnet publish ${{ env.PROJECT_PATH }} -f net9.0-android -c Release --no-build
      
    # - name: 📤 Upload Android Artifacts
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: android-artifacts
    #     path: |
    #       src/StoreIt.Maui/bin/Release/net9.0-android/
    #       !src/StoreIt.Maui/bin/Release/net9.0-android/ref/
    #       !src/StoreIt.Maui/bin/Release/net9.0-android/*.pdb
    #     retention-days: 7

  # 🍎 iOS Build Job (macOS runner required for iOS)
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-15
    # needs: build-and-test
    
    steps:
  
    - name: 🤖 Set Xcode version 
      run: sudo xcode-select -s /Applications/Xcode_16.4.app

    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📦 Install .NET MAUI Workload
      run: dotnet workload install maui

    - name: 🔍 Restore Dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 🔨 Build iOS
      run: dotnet build ${{ env.PROJECT_PATH }} -f net9.0-ios -c Release

    # - name: 📤 Upload iOS Artifacts
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: ios-artifacts
    #     path: |
    #       src/StoreIt.Maui/bin/Release/net9.0-ios/
    #       !src/StoreIt.Maui/bin/Release/net9.0-ios/ref/
    #       !src/StoreIt.Maui/bin/Release/net9.0-ios/*.pdb
    #     retention-days: 7
    
  # 🎯 Summary Job
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()
    
    steps:
    - name: 🎉 All Jobs Completed
      run: |
        echo "🎯 CI Pipeline completed!"
        echo "Build Status Summary:"
        echo "- Android Build: ${{ needs.build-android.result }}"
        echo "- iOS Build: ${{ needs.build-ios.result }}"
        
    - name: ❌ Check for Failures
      if: contains(needs.*.result, 'failure')
      run: |
        echo "❌ One or more jobs failed!"
        exit 1
        
    - name: ✅ Success
      if: contains(needs.*.result, 'failure') == false
      run: |
        echo "✅ All jobs completed successfully!"
